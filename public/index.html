<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sale Feed Viewer</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-main: #0f172a;
        --bg-panel: #111c33;
        --bg-card: rgba(15, 23, 42, 0.85);
        --border-muted: rgba(148, 163, 184, 0.2);
        --border-strong: rgba(59, 130, 246, 0.45);
        --text-primary: #e2e8f0;
        --text-muted: #94a3b8;
        --accent: #38bdf8;
        --accent-strong: #0ea5e9;
        --success: #22c55e;
        --error: #ef4444;
        --warning: #f59e0b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Inter", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        background: radial-gradient(circle at top, rgba(56, 189, 248, 0.25), transparent 45%),
          radial-gradient(circle at 20% 80%, rgba(99, 102, 241, 0.25), transparent 45%),
          var(--bg-main);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 28px 24px 12px;
        border-bottom: 1px solid var(--border-muted);
        background: linear-gradient(160deg, rgba(14, 116, 214, 0.35), rgba(12, 74, 110, 0.15));
        box-shadow: 0 12px 24px rgba(15, 23, 42, 0.45);
      }

      header h1 {
        margin: 0 0 8px;
        font-size: clamp(1.6rem, 2.4vw, 2.1rem);
        letter-spacing: 0.02em;
      }

      header p {
        margin: 0;
        color: var(--text-muted);
        font-size: 0.95rem;
        max-width: 720px;
      }

      main {
        flex: 1;
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px clamp(16px, 4vw, 32px) 48px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      #controls {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        align-items: flex-end;
        background: rgba(15, 23, 42, 0.65);
        border: 1px solid var(--border-muted);
        border-radius: 16px;
        padding: 18px;
        backdrop-filter: blur(12px);
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.3);
      }

      .control-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-width: 200px;
      }

      label {
        font-size: 0.85rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
      }

      input[type="number"] {
        appearance: none;
        padding: 10px 12px;
        border: 1px solid var(--border-muted);
        border-radius: 10px;
        font-size: 1rem;
        background: rgba(15, 23, 42, 0.75);
        color: var(--text-primary);
        transition: border-color 150ms ease, box-shadow 150ms ease;
      }

      input[type="number"]:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.25);
        outline: none;
      }

      #controls small {
        color: var(--text-muted);
        font-size: 0.8rem;
        max-width: 320px;
      }

      #quick-stats {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        margin-left: auto;
        color: var(--text-muted);
        font-size: 0.85rem;
      }

      #status {
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid var(--border-muted);
        background: rgba(15, 23, 42, 0.6);
        font-weight: 600;
        letter-spacing: 0.02em;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        width: fit-content;
      }

      #status.online {
        border-color: rgba(34, 197, 94, 0.4);
        color: var(--success);
      }

      #status.offline {
        border-color: rgba(239, 68, 68, 0.35);
        color: var(--error);
      }

      #items {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 20px;
      }

      .item {
        background: var(--bg-card);
        border: 1px solid rgba(59, 130, 246, 0.08);
        border-radius: 18px;
        padding: 0;
        display: flex;
        flex-direction: column;
        backdrop-filter: blur(8px);
        box-shadow: 0 12px 24px rgba(15, 23, 42, 0.35);
        transition: transform 150ms ease, border-color 150ms ease, box-shadow 150ms ease;
        overflow: hidden;
      }

      .item-image {
        width: 100%;
        aspect-ratio: 16 / 9; /* proporcje zamiast padding-top */
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-panel);
        border-radius: 18px 18px 0 0;
        overflow: hidden;
        position: relative;
      }

      .item-image img {
        max-width: 90%;
        max-height: 90%;
        object-fit: contain;
        object-position: center;
        transition: transform 200ms ease;
      }



      .item:hover .item-image img {
        transform: scale(1.1);
      }

      .item > *:not(.item-image) {
        padding: 18px 20px;
      }

      .item:hover {
        transform: translateY(-4px);
        border-color: var(--border-strong);
        box-shadow: 0 16px 28px rgba(15, 23, 42, 0.45);
      }

      .item-image {
        margin: -18px -20px 12px;
        border-radius: 18px 18px 0 0;
        overflow: hidden;
        position: relative;
        padding-top: 56.25%; /* 16:9 aspect ratio */
        background: var(--bg-panel);
      }

      .item-image img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 200ms ease;
      }

      .item:hover .item-image img {
        transform: scale(1.05);
      }

      .item-header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: baseline;
      }

      .item-title {
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      .item-meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        color: var(--text-muted);
        font-size: 0.8rem;
      }

      .pill {
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.18);
        border: 1px solid rgba(148, 163, 184, 0.22);
      }

      .pill.discount-high {
        background: rgba(34, 197, 94, 0.18);
        border-color: rgba(34, 197, 94, 0.35);
        color: var(--success);
      }

      .pill.discount-low {
        background: rgba(59, 130, 246, 0.15);
        border-color: rgba(59, 130, 246, 0.28);
      }

      .price-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
      }

      .price-chip {
        padding: 10px 14px;
        border-radius: 12px;
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(13, 148, 136, 0.1));
        border: 1px solid rgba(148, 163, 184, 0.25);
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      .comparison-grid {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .comparison {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(15, 23, 42, 0.65);
        border: 1px solid rgba(148, 163, 184, 0.2);
        transition: border-color 150ms ease;
      }

      .comparison .source {
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      .comparison .value {
        font-size: 0.95rem;
        font-weight: 600;
      }

      .comparison .diff {
        font-size: 0.8rem;
      }

      .comparison.positive {
        border-color: rgba(34, 197, 94, 0.4);
      }

      .comparison.positive .diff {
        color: var(--success);
      }

      .comparison.negative {
        border-color: rgba(239, 68, 68, 0.4);
      }

      .comparison.negative .diff {
        color: var(--error);
      }

      .comparison.neutral {
        border-color: rgba(148, 163, 184, 0.25);
      }

      .comparison .meta-link {
        font-size: 0.75rem;
        color: var(--accent);
        text-decoration: none;
        transition: color 150ms ease;
      }

      .comparison .meta-link:hover {
        color: var(--accent-strong);
      }

      .notes {
        color: var(--text-muted);
        font-size: 0.78rem;
      }

      .empty-state {
        padding: 48px 24px;
        border-radius: 16px;
        border: 1px dashed rgba(148, 163, 184, 0.4);
        text-align: center;
        background: rgba(15, 23, 42, 0.55);
        color: var(--text-muted);
        margin-top: 24px;
      }

      @media (max-width: 720px) {
        main {
          padding-top: 16px;
        }
        #controls {
          padding: 16px;
        }
        #items {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Sale Feed (live)</h1>
      <p>Sledz w czasie rzeczywistym oferty Skinport oraz porownaj je z cenami ze Steam i CSFloat.</p>
    </header>

    <main>
      <section id="controls">
        <div class="control-group">
          <label for="minDiscount">Minimalna znizka (%)</label>
          <input id="minDiscount" type="number" min="0" max="100" value="0" />
          <small>Ustaw, aby wyswietlac tylko przedmioty z co najmniej taka znizka.</small>
        </div>
        <div id="quick-stats">
          <span id="itemsCount">0 ofert</span>
          <span id="lastUpdated">-</span>
        </div>
      </section>

      <div id="status">Laczenie...</div>
      <div id="items"></div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/client.js"></script>
  </body>
</html>
